name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          RENDER_KEEPALIVE_URL: ${{ secrets.RENDER_KEEPALIVE_URL }}
        run: |
          RENDER_KEEPALIVE_URL="${RENDER_KEEPALIVE_URL:-https://cruztitla.onrender.com/api/health}"

          if [ -z "$RENDER_KEEPALIVE_URL" ]; then
            echo "RENDER_KEEPALIVE_URL secret is not configured."
            exit 0
          fi

          curl --fail --silent --show-error --max-time 30 "$RENDER_KEEPALIVE_URL"
