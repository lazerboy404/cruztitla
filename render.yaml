services:
  - type: web
    name: credenciales-cruztitla
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_TIMEZONE
        value: America/Mexico_City
      - key: OCR_PROVIDER
        value: api_only
      - key: STORAGE_DIR
        value: /tmp/cruztitla-storage
      - key: OPENCV_NUM_THREADS
        value: 1
      - key: OMP_NUM_THREADS
        value: 1
      - key: OPENBLAS_NUM_THREADS
        value: 1
