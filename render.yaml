services:
  - type: web
    name: credenciales-cruztitla
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_TIMEZONE
        value: America/Mexico_City
      - key: OCR_PROVIDER
        value: auto
