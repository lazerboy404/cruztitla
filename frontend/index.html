<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Credenciales Cruztitla</title>
    <link rel="icon" type="image/svg+xml" href="/frontend/favicon.svg?v=cruztitla-ui-20260602j" />
    <link rel="stylesheet" href="/frontend/styles.css?v=cruztitla-ui-20260602j" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay" hidden>
      <div class="loading-box">
        <span class="spinner" aria-hidden="true"></span>
        <strong id="loadingTitle">Procesando</strong>
        <p id="loadingText">Preparando credencial</p>
      </div>
    </div>

    <header class="topbar">
      <div class="brand-block">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64">
            <defs>
              <clipPath id="ballClip">
                <circle cx="32" cy="32" r="29" />
              </clipPath>
            </defs>
            <circle class="soccer-ball-base" cx="32" cy="32" r="29" />
            <g clip-path="url(#ballClip)">
              <path class="soccer-seam" d="M24 4 23 14 32 20 41 14 40 4" />
              <path class="soccer-seam" d="M23 14 12 20 9 33 16 42 27 39" />
              <path class="soccer-seam" d="M41 14 52 20 55 33 48 42 37 39" />
              <path class="soccer-seam" d="M16 42 18 55 29 64" />
              <path class="soccer-seam" d="M48 42 46 55 35 64" />
              <path class="soccer-seam" d="M27 39 29 50 35 50 37 39" />
              <polygon class="soccer-white-panel" points="32 20 43 28 39 39 25 39 21 28" />
              <polygon class="soccer-black-panel" points="24 4 40 4 41 14 32 20 23 14" />
              <polygon class="soccer-black-panel" points="52 20 63 26 60 41 48 42 55 33" />
              <polygon class="soccer-black-panel" points="12 20 1 26 4 41 16 42 9 33" />
              <polygon class="soccer-black-panel" points="29 50 35 50 46 55 40 66 24 66 18 55" />
              <polygon class="soccer-black-panel" points="43 28 55 33 48 42 37 39 39 39" />
              <polygon class="soccer-black-panel" points="21 28 9 33 16 42 27 39 25 39" />
            </g>
            <circle class="soccer-ball-ring" cx="32" cy="32" r="29" />
          </svg>
        </div>
        <h1>Liga de Futbol Soccer Cruztitla</h1>
      </div>

      <button class="admin-button" type="button" aria-label="Cuenta de administrador">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 21a8 8 0 0 0-16 0" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span>Administrador</span>
      </button>
    </header>

    <main class="app-shell">
      <section class="workspace-panel" aria-label="Datos de credencial">
        <section class="panel-card">
          <div class="section-heading">
            <h3>Identificación</h3>
            <p id="resultState">Sube una identificación para extraer los datos.</p>
          </div>

          <label class="upload-card" id="dropzone">
            <input id="fileInput" type="file" accept="image/*" />
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 16V4" />
              <path d="m7 9 5-5 5 5" />
              <path d="M20 16.5v1.8A1.7 1.7 0 0 1 18.3 20H5.7A1.7 1.7 0 0 1 4 18.3v-1.8" />
            </svg>
            <span>Arrastra y suelta la imagen aquí<br />o selecciona un archivo</span>
            <strong>Seleccionar archivo</strong>
            <small id="fileName">Formatos permitidos: JPG, PNG | Máx. 5 MB</small>
          </label>
        </section>

        <div class="preview-strip">
          <figure>
            <img id="warpedPreview" alt="Identificación enderezada" />
            <figcaption>Documento</figcaption>
          </figure>
          <figure>
            <img id="facePreview" alt="Foto recortada" />
            <figcaption>Foto</figcaption>
          </figure>
        </div>

        <section class="panel-card form-card">
          <div class="section-heading data-heading">
            <h3>Datos de credencial</h3>
            <label class="season-control">
              <span>TEM.20</span>
              <select id="temporadaSuffix" name="temporada_suffix"></select>
            </label>
          </div>

          <form id="credentialForm" class="form-grid">
            <label>
              <span>NOMBRE</span>
              <input id="nombreCompleto" name="nombre_completo" autocomplete="name" />
            </label>

            <label>
              <span>EQUIPO</span>
              <select id="equipo" name="equipo"></select>
            </label>

            <label>
              <span>CATEGORÍA</span>
              <select id="categoria" name="categoria"></select>
            </label>

            <label>
              <span>NO. DE JUGADOR</span>
              <input id="numeroJugador" name="numero_jugador" type="number" min="0" max="9999" />
            </label>

            <label>
              <span>FECHA DE NACIMIENTO</span>
              <input id="fechaNacimiento" name="fecha_nacimiento" placeholder="DD/MM/AAAA" />
            </label>

            <div class="date-field">
              <span>LUGAR Y FECHA</span>
              <div class="date-control">
                <input id="lugarFecha" name="lugar_fecha" readonly />
                <button class="icon-button" id="calendarButton" type="button" aria-label="Seleccionar fecha">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8 2v4" />
                    <path d="M16 2v4" />
                    <path d="M4 9h16" />
                    <path d="M6 4h12a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" />
                  </svg>
                </button>
              </div>

              <div class="calendar-popover" id="calendarPopover" hidden>
                <div class="calendar-head">
                  <button type="button" class="calendar-nav" id="prevMonth" aria-label="Mes anterior">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6" /></svg>
                  </button>
                  <strong id="calendarTitle">mayo 2026</strong>
                  <button type="button" class="calendar-nav" id="nextMonth" aria-label="Mes siguiente">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6" /></svg>
                  </button>
                </div>
                <div class="calendar-weekdays" aria-hidden="true">
                  <span>lu</span><span>ma</span><span>mi</span><span>ju</span><span>vi</span><span>sá</span><span>do</span>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
              </div>
            </div>

            <button class="primary-button" id="generateButton" type="submit" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="5" width="18" height="14" rx="2" />
                <path d="M7 10h4" />
                <path d="M7 14h7" />
                <circle cx="17" cy="11" r="1.5" />
              </svg>
              Generar credencial
            </button>
          </form>

          <div class="warnings" id="warnings" hidden></div>
        </section>
      </section>

      <section class="result-panel" aria-label="Vista previa de credencial">
        <div class="preview-toolbar">
          <h3>Vista previa</h3>
          <div class="preview-actions">
            <a class="download-button is-disabled" id="downloadLink" href="#" download>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3v12" />
                <path d="m7 10 5 5 5-5" />
                <path d="M5 21h14" />
              </svg>
              Descargar imagen
            </a>
            <a class="format-button is-disabled" id="formatDownloadLink" href="#" download>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z" />
                <path d="M14 2v6h6" />
                <path d="M8 13h8" />
                <path d="M8 17h6" />
              </svg>
              Descargar formato
            </a>
          </div>
        </div>
        <div class="credential-frame">
          <img id="credentialPreview" src="/static/plantilla-preview.webp" alt="Plantilla de credencial" />
        </div>
      </section>
    </main>

    <span id="serverDate" hidden>Tultitlán, Méx. 29 de mayo de 2026</span>

    <script src="/frontend/app.js?v=cruztitla-ui-20260602j" type="module"></script>
  </body>
</html>
